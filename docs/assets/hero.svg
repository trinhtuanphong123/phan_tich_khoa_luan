    <circle cx="917" cy="346" r="9" fill="#10A37F"/>
    <circle cx="1041" cy="268" r="9" fill="#FAAD14"/>
    <rect x="755" y="430" width="360" height="18" rx="9" fill="#CBD5E1"/>
