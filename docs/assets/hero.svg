    <path d="M0 140 H1280 M0 240 H1280 M0 340 H1280 M0 440 H1280 M160 0 V640 M320 0 V640 M480 0 V640 M640 0 V640 M800 0 V640 M960 0 V640 M1120 0 V640" stroke="#EAF2FF" stroke-width="1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="725" y="92" width="430" height="380" rx="26" fill="#F9FAFB"/>
    <rect x="755" y="126" width="150" height="20" rx="10" fill="#0F172A"/>
    <rect x="755" y="168" width="360" height="70" rx="18" fill="#ECFDF5" stroke="#10A37F"/>
    <rect x="755" y="258" width="104" height="150" rx="16" fill="#FFF7ED"/>
    <rect x="883" y="296" width="104" height="112" rx="16" fill="#EFF6FF"/>
    <rect x="1011" y="220" width="104" height="188" rx="16" fill="#FEF3C7"/>
    <path d="M780 355 L835 324 L917 346 L1041 268 L1096 288" stroke="#111827" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
