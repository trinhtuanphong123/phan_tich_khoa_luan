    <text x="155" y="112" text-anchor="middle" fill="#7BE7C9" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700">VN30 MULTI-AGENT</text>
    <text x="74" y="205" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial" font-size="76" font-weight="900" letter-spacing="-3">TradingAgent-VN</text>
    <text x="78" y="262" fill="#D9EAF7" font-family="Inter, Segoe UI, Arial" font-size="30" font-weight="650">AI Hedge Fund cho thị trường chứng khoán Việt Nam</text>
